<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#050505"/>
  <defs>
    <pattern id="smallGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#242424" stroke-opacity="0.45" stroke-width="1"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="65%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="gridMask"><rect width="1600" height="900" fill="url(#fade)"/></mask>
  </defs>
  <rect x="0" y="0" width="1600" height="900" fill="url(#smallGrid)" mask="url(#gridMask)"/>
</svg>

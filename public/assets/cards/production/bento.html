.bc{

  border-radius:24px;position:relative;overflow:hidden;flex-shrink:0;cursor:none;
}
.bc svg{position:absolute;inset:0;width:100%;height:100%;}

  border:1.5px solid rgba(28,28,28,0.45);pointer-events:none;z-index:20;
  transform:translate(-50%,-50%) scale(0);
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.bc.in #cur{transform:translate(-50%,-50%) scale(1);}

<script>
(function(){
  /* ── Cursor ── */
  var card=document.getElementById('card'),cur=document.getElementById('cur');
  var raf=null,tcx=0,tcy=0,cx=0,cy=0;
  card.addEventListener('mouseenter',function(){card.classList.add('in');if(!raf)raf=requestAnimationFrame(loop);});
  card.addEventListener('mouseleave',function(){card.classList.remove('in');cancelAnimationFrame(raf);raf=null;});
  card.addEventListener('mousemove',function(e){var r=card.getBoundingClientRect();tcx=e.clientX-r.left;tcy=e.clientY-r.top;});
  function loop(){cx+=(tcx-cx)*0.12;cy+=(tcy-cy)*0.12;cur.style.left=cx.toFixed(1)+'px';cur.style.top=cy.toFixed(1)+'px';raf=requestAnimationFrame(loop);}

  /* ── Sequential fill loop ── */
  var AIDS  = ['a0','a1','a2','a3','a4','a5','a6','a7','a8','a9','a10','a11','a12','a13','a14','a15','a16','a17','a18','a19','a20','a21','a22','a23','a24'];
  var GIDS  = [null,null,null,null,null,'g5',null,null,null,'g9',null,null,'g12',null,null,null,'g16',null,null,null,'g20',null,null,'g23',null];
  var N     = AIDS.length;   /* 25 */
  var STEP  = 280;           /* ms entre cada item acender */
  var PAUSE = 1800;          /* ms com todos acesos antes de resetar */
  var timers = [];

  function el(id){ return id ? document.getElementById(id) : null; }

  function resetAll(){
    /* Remove transitions para reset instantâneo */
    for(var i=0;i<N;i++){
      var a=el(AIDS[i]), g=el(GIDS[i]);
      if(a){ a.style.transition='none'; a.style.opacity='0'; }
      if(g){ g.style.transition='none'; g.style.opacity='0.15'; }
    }
    /* Força reflow antes de religar transitions */
    void document.body.offsetHeight;
    for(var i=0;i<N;i++){
      var a=el(AIDS[i]), g=el(GIDS[i]);
      if(a) a.style.transition='opacity 0.4s ease';
      if(g) g.style.transition='opacity 0.4s ease';
    }
  }

  function runCycle(){
    timers.forEach(clearTimeout);
    timers=[];
    for(var i=0;i<N;i++){
      (function(n){
        timers.push(setTimeout(function(){
          var a=el(AIDS[n]), g=el(GIDS[n]);
          if(a) a.style.opacity='1';
          if(g) g.style.opacity='0';      /* ghost some quando logo aparece */
          /* Último item — agenda reset */
          if(n===N-1){
            timers.push(setTimeout(function(){
              resetAll();
              setTimeout(runCycle, 80);   /* pequeno gap antes do próximo ciclo */
            }, PAUSE));
          }
        }, n * STEP));
      })(i);
    }
  }

  runCycle();
})();
</script>
